<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finanças do Casal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <script>
    // Tema + modo compacto antes do render (evita flash)
    (function() {
      try {
        var saved = localStorage.getItem('theme');
        if (!saved) {
          saved = (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark';
        }
        document.documentElement.setAttribute('data-theme', saved);
        if (localStorage.getItem('compact') === '1') {
          document.documentElement.setAttribute('data-compact', '1');
        }
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <!-- Background -->
  <div class="bg-decor">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- Toasts -->
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <main class="container">
    <header class="header-bar fade-in" style="--delay:0ms">
      <h1>Finanças<span class="dot">.</span></h1>
      <div class="header-actions">
        <button id="compact-toggle" class="icon-btn" type="button" title="Modo compacto" aria-label="Modo compacto">
          <svg class="icon-expanded" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          <svg class="icon-compact" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="8" x2="21" y2="8"/><line x1="3" y1="16" x2="21" y2="16"/></svg>
        </button>
        <button id="theme-toggle" class="theme-toggle" type="button" title="Alternar tema" aria-label="Alternar tema">
          <span class="toggle-thumb"></span>
          <span class="toggle-icon sun" aria-hidden="true">☀️</span>
          <span class="toggle-icon moon" aria-hidden="true">🌙</span>
        </button>
      </div>
    </header>

    <!-- Adicionar pessoa -->
    <section class="card fade-in" style="--delay:60ms">
      <h2>Adicionar pessoa</h2>
      <form id="form-pessoa" class="row">
        <input type="text" id="nome-pessoa" placeholder="Nome da pessoa" autocomplete="off" />
        <button type="submit">Adicionar</button>
      </form>
      <div id="lista-pessoas" class="chips"></div>
    </section>

    <!-- Skeleton inicial -->
    <div id="skeleton-wrap" class="skeleton-wrap">
      <div class="card skeleton-card">
        <div class="skel skel-title"></div>
        <div class="skel skel-line" style="width:60%"></div>
        <div class="skel skel-line" style="width:40%"></div>
      </div>
      <div class="card skeleton-card">
        <div class="skel skel-title"></div>
        <div class="skel skel-grid">
          <div class="skel skel-box"></div>
          <div class="skel skel-box"></div>
          <div class="skel skel-box"></div>
        </div>
      </div>
    </div>

    <div id="app" class="hidden">

      <!-- Dashboard -->
      <section id="dashboard" class="card fade-in hidden" style="--delay:100ms">
        <div class="dashboard-header">
          <h2>Dashboard</h2>
          <button id="btn-toggle-dashboard" class="chip-btn" type="button">Ocultar</button>
        </div>
        <div id="dashboard-content" class="dashboard-grid">
          <div class="chart-card">
            <h3>Evolução mensal</h3>
            <div class="chart-box"><canvas id="chart-evolucao"></canvas></div>
          </div>
          <div class="chart-card">
            <h3>Saídas por pessoa</h3>
            <div class="chart-box"><canvas id="chart-distribuicao"></canvas></div>
          </div>
        </div>
      </section>

      <!-- Período -->
      <section class="card fade-in" style="--delay:140ms">
        <h2>Período</h2>
        <p class="hint">Clique nos meses. Sem seleção = todos. Com 2+ selecionados = comparativo.</p>
        <div id="lista-meses" class="chips"></div>
      </section>

      <!-- Total geral -->
      <section id="secao-total-geral" class="card fade-in hidden" style="--delay:160ms">
        <h2>Total geral (<span id="total-geral-nomes"></span>)</h2>
        <div class="resumo-inline">
          <div><span class="label">Entrada</span><span id="geral-entrada" class="valor entrada" data-countup="0">R$ 0,00</span></div>
          <div><span class="label">Saída</span><span id="geral-saida" class="valor saida" data-countup="0">R$ 0,00</span></div>
          <div><span class="label">Total</span><span id="geral-total" class="valor" data-countup="0">R$ 0,00</span></div>
        </div>
        <div id="geral-orcamento" class="budget-bar"></div>
        <div id="geral-comparativo" class="comparativo-wrap"></div>
      </section>

      <!-- Tabelas por pessoa -->
      <div id="tabelas-pessoas"></div>

    </div>
  </main>

  <!-- Focus modal -->
  <div id="focus-modal" class="focus-modal hidden" aria-hidden="true">
    <div class="focus-backdrop"></div>
    <div class="focus-inner">
      <button class="focus-close icon-btn" type="button" aria-label="Fechar">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div id="focus-content" class="focus-content"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
