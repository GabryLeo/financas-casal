<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finanças do Casal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Background decorativo -->
  <div class="bg-decor">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <main class="container">
    <header class="header-bar">
      <h1>Finanças<span class="dot">.</span></h1>
      <button id="theme-toggle" class="theme-toggle" type="button" title="Alternar tema" aria-label="Alternar tema">
        <span class="icon-sun">☀️</span>
        <span class="icon-moon">🌙</span>
      </button>
    </header>

    <!-- Adicionar pessoa -->
    <section class="card">
      <h2>Adicionar pessoa</h2>
      <form id="form-pessoa" class="row">
        <input type="text" id="nome-pessoa" placeholder="Nome da pessoa" autocomplete="off" />
        <button type="submit">Adicionar</button>
      </form>
      <div id="lista-pessoas" class="chips"></div>
    </section>

    <div id="app" class="hidden">

      <!-- Seletor de período -->
      <section class="card">
        <h2>Período</h2>
        <p class="hint">Clique nos meses. Sem seleção = todos os meses. Com seleção = filtra e (se 2+) mostra comparativo.</p>
        <div id="lista-meses" class="chips"></div>
      </section>

      <!-- Total consolidado -->
      <section id="secao-total-geral" class="card hidden">
        <h2>Total geral (<span id="total-geral-nomes"></span>)</h2>
        <div class="resumo-inline">
          <div><span class="label">Entrada</span><span id="geral-entrada" class="valor entrada">R$ 0,00</span></div>
          <div><span class="label">Saída</span><span id="geral-saida" class="valor saida">R$ 0,00</span></div>
          <div><span class="label">Total</span><span id="geral-total" class="valor">R$ 0,00</span></div>
        </div>
        <div id="geral-comparativo" class="comparativo-wrap"></div>
      </section>

      <!-- Tabelas por pessoa -->
      <div id="tabelas-pessoas"></div>

    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
