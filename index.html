<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finanças do Casal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>Finanças</h1>

    <!-- Adicionar pessoa -->
    <section class="card">
      <h2>Adicionar pessoa</h2>
      <form id="form-pessoa" class="row">
        <input type="text" id="nome-pessoa" placeholder="Nome da pessoa" autocomplete="off" />
        <button type="submit">Adicionar</button>
      </form>
      <div id="lista-pessoas" class="chips"></div>
    </section>

    <div id="app" class="hidden">

      <!-- Total consolidado (aparece só com 2+ pessoas selecionadas) -->
      <section id="secao-total-geral" class="card hidden">
        <h2>Total geral (<span id="total-geral-nomes"></span>)</h2>
        <div class="resumo-inline">
          <div><span class="label">Entrada</span><span id="geral-entrada" class="valor entrada">R$ 0,00</span></div>
          <div><span class="label">Saída</span><span id="geral-saida" class="valor saida">R$ 0,00</span></div>
          <div><span class="label">Total</span><span id="geral-total" class="valor">R$ 0,00</span></div>
        </div>
      </section>

      <!-- Tabelas por pessoa -->
      <div id="tabelas-pessoas"></div>

    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
